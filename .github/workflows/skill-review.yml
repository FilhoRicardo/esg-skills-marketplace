name: Skill intake gate

on:
  pull_request_target:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: skill-intake-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  policy:
    name: trust / policy
    runs-on: ubuntu-latest
    steps:
      - name: Check out the proposed merge
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          fetch-depth: 0
          path: candidate
          persist-credentials: false

      - name: Check out trusted policy code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main
          path: trusted
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Enforce contributor scope
        run: >-
          python3 trusted/scripts/validate_pr_scope.py
          --repo candidate
          --base "${{ github.event.pull_request.base.sha }}"
          --actor "${{ github.actor }}"

      - name: Run policy tests
        run: python3 -m unittest discover -s tests
        working-directory: trusted

      - name: Validate every approved skill
        run: python3 trusted/scripts/validate_skills.py --root candidate --all

      - name: Confirm generated catalogue is current
        run: python3 trusted/scripts/build_catalog.py --root candidate --check

  skillspector:
    name: trust / SkillSpector
    needs: policy
    runs-on: ubuntu-latest
    steps:
      - name: Check out the proposed merge
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          fetch-depth: 0
          path: candidate
          persist-credentials: false

      - name: Check out trusted scanner wrapper
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main
          path: trusted
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Check out pinned NVIDIA SkillSpector
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: NVIDIA/SkillSpector
          ref: a5092dd9b9521ff57a9b53612bb129ce78019002
          path: tools/skillspector
          persist-credentials: false

      - name: Set up pinned uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          version: "0.11.14"
          python-version: "3.12"
          enable-cache: false

      - name: Install SkillSpector from its frozen lockfile
        run: |
          uv sync --frozen --no-dev --python 3.12 --project tools/skillspector
          echo "${GITHUB_WORKSPACE}/tools/skillspector/.venv/bin" >> "${GITHUB_PATH}"

      - name: Record scanner version
        run: skillspector --version

      - name: Scan changed skills without executing them
        run: >-
          python3 trusted/scripts/run_skillspector.py
          --root candidate
          --base "${{ github.event.pull_request.base.sha }}"
          --reports "${{ github.workspace }}/artifacts/skillspector"

      - name: Preserve SkillSpector reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: skillspector-reports
          path: artifacts/skillspector/*.json
          if-no-files-found: ignore
          retention-days: 14
