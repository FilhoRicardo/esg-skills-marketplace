name: Publish public marketplace

on:
  push:
    branches: [main]
    paths:
      - "skills/**"
      - "site/**"
      - "scripts/build_catalog.py"
      - "scripts/publish_site.py"
      - "scripts/site_intake.py"
      - "tests/**"
      - ".github/workflows/site-deploy.yml"

permissions:
  contents: read

concurrency:
  group: publish-public-marketplace
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Rebuild published artefacts
        run: python3 scripts/build_catalog.py

      - name: Verify catalogue and policy
        run: |
          python3 scripts/build_catalog.py --check
          python3 scripts/validate_skills.py --all
          python3 -m unittest discover -s tests

      - name: Publish the live site
        env:
          HERENOW_API_KEY: ${{ secrets.HERENOW_API_KEY }}
          HERENOW_SITE_SLUG: ${{ vars.HERENOW_SITE_SLUG }}
        run: >-
          python3 scripts/publish_site.py site
          --slug "${HERENOW_SITE_SLUG}"
          --client "github-actions/esg-skills-marketplace"
